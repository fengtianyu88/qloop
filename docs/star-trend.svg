<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcb2d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffcb2d" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="720" height="260" fill="#ffffff" rx="8"/>

  <!-- 标题 -->
  <text x="60" y="20" font-size="14" font-weight="600" fill="#24292f">Star Trend</text>
  <text x="690" y="20" font-size="12" fill="#8b949e" text-anchor="end">fengtianyu88/qloop</text>

  <!-- 网格线 + Y 轴标签 -->
  <line x1="60" y1="210.0" x2="690" y2="210.0" stroke="#eaecef" stroke-width="1"/>
  <text x="52" y="214.0" font-size="11" fill="#6e7681" text-anchor="end">0</text>
  <line x1="60" y1="30.0" x2="690" y2="30.0" stroke="#eaecef" stroke-width="1"/>
  <text x="52" y="34.0" font-size="11" fill="#6e7681" text-anchor="end">1</text>

  <!-- 填充区域 -->
  <path d="M 371.5 30.0 L 371.5 210.0 L 371.5 210.0 Z" fill="url(#starGrad)"/>

  <!-- 折线 -->
  <path d="M 371.5 30.0" fill="none" stroke="#ffcb2d" stroke-width="2" stroke-linejoin="round"/>

  <!-- 数据点 -->
  <circle cx="371.5" cy="30.0" r="3" fill="#ffcb2d" stroke="#ffffff" stroke-width="1.5"/>

  <!-- X 轴 -->
  <line x1="60" y1="210" x2="690" y2="210" stroke="#d0d7de" stroke-width="1"/>

  <!-- X 轴标签 -->
  <text x="60.0" y="228" font-size="11" fill="#6e7681" text-anchor="middle">07/21</text>
  <text x="690.0" y="228" font-size="11" fill="#6e7681" text-anchor="middle">07/23</text>

  <!-- 右下角总数 -->
  <text x="690" y="252" font-size="11" fill="#8b949e" text-anchor="end">Total: 1 stars</text>
</svg>
